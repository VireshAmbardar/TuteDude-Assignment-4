<!DOCTYPE html>
<html>
<head>
    <title>Success</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #c8e6c9;
        }
        h1 {
            color: #2e7d32;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        a:hover {
            background-color: #1976D2;
        }
    </style>
</head>
<body>
    <div class="success-message">
        <h1>✓ Success!</h1>
        <p>Data submitted successfully</p>
    </div>
    
    <a href="/">Submit Another Entry</a>
</body>
</html>
